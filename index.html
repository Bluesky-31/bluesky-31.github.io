<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BLAST BILLIARDS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--accent:#ff6b00;--safe:#00ff88;--warn:#ff9900;--danger:#ff2a2a;--text:#e8e0cc;}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0d0d;font-family:'Share Tech Mono',monospace;color:var(--text);touch-action:none;}

/* ── HOME SCREEN ── */
#home{position:fixed;inset:0;background:#0d0d0d;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;z-index:100;padding:20px;}
#home.hidden{display:none;}
#home-title{font-family:‘Black Ops One’,cursive;font-size:2.4rem;letter-spacing:5px;color:var(–accent);text-shadow:0 0 24px rgba(255,107,0,.6);text-align:center;line-height:1.1;margin-bottom:6px;}
#home-sub{font-size:.65rem;letter-spacing:3px;color:#555;text-transform:uppercase;margin-bottom:32px;}
.diff-label{font-size:.55rem;letter-spacing:3px;color:#666;text-transform:uppercase;margin-bottom:10px;text-align:center;}
.diff-btns{display:flex;gap:10px;margin-bottom:32px;}
.diff-btn{font-family:‘Black Ops One’,cursive;font-size:.85rem;letter-spacing:2px;padding:12px 22px;border:2px solid #333;border-radius:6px;background:transparent;color:#666;cursor:pointer;touch-action:manipulation;transition:all .15s;}
.diff-btn.active{border-color:var(–accent);color:var(–accent);background:rgba(255,107,0,.1);}
#home-desc{font-size:.6rem;color:#444;letter-spacing:1px;text-align:center;margin-bottom:28px;line-height:1.7;min-height:40px;}
#home-start{font-family:‘Black Ops One’,cursive;font-size:1.2rem;letter-spacing:4px;padding:16px 48px;background:var(–accent);border:none;border-radius:8px;color:#000;cursor:pointer;touch-action:manipulation;}
#home-start:active{background:#cc5500;}

/* ── APP SHELL ── */
#app{display:flex;flex-direction:column;width:100vw;height:100dvh;}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:#111;border-bottom:1px solid #222;flex-shrink:0;}
#topbar h1{font-family:‘Black Ops One’,cursive;font-size:.9rem;letter-spacing:3px;color:var(–accent);text-shadow:0 0 10px rgba(255,107,0,.5);}
.stats{display:flex;gap:12px;align-items:center;}
.stat{display:flex;flex-direction:column;align-items:center;}
.stat-label{font-size:.4rem;letter-spacing:2px;color:#555;text-transform:uppercase;}
.stat-value{font-size:.8rem;}
#btn-home{font-family:‘Share Tech Mono’,monospace;font-size:.55rem;letter-spacing:1px;padding:4px 8px;background:transparent;border:1px solid #333;border-radius:3px;color:#555;cursor:pointer;touch-action:manipulation;}
#btn-home:active{border-color:var(–accent);color:var(–accent);}

/* ── CANVAS ── */
#canvas-wrap{position:relative;flex:1;min-height:0;overflow:hidden;background:#0d0d0d;}
#game{display:block;width:100%;height:100%;}

/* ── CONTROLS ── */
#controls{background:#111;border-top:1px solid #222;padding:8px 10px 10px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.ctrl-row{display:flex;align-items:center;gap:8px;}
#spin-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;}
#spin-canvas{display:block;border-radius:50%;touch-action:none;}
#power-wrap{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0;}
.ctrl-label{font-size:.5rem;letter-spacing:2px;color:#555;text-transform:uppercase;}
#power-row{display:flex;justify-content:space-between;align-items:baseline;}
#power-pct{font-size:.72rem;color:var(–accent);}
/* power-track: pointer-events handled in JS, stopPropagation prevents aim */
#power-track{width:100%;height:20px;background:#1a1a1a;border:1px solid #333;border-radius:10px;overflow:hidden;cursor:pointer;touch-action:none;}
#power-fill{height:100%;width:60%;background:linear-gradient(90deg,#00ff88,#ff9900,#ff2a2a);pointer-events:none;transition:width 0.05s linear;}
#pslider{width:100%;margin-top:3px;accent-color:var(–accent);touch-action:none;}
#fire-btn{background:var(–accent);border:none;border-radius:6px;color:#000;font-family:‘Black Ops One’,cursive;font-size:.95rem;letter-spacing:2px;padding:0 16px;height:52px;cursor:pointer;touch-action:manipulation;flex-shrink:0;white-space:nowrap;}
#fire-btn:active{background:#cc5500;}

#bomb-strip{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
#bomb-strip::-webkit-scrollbar{display:none;}
.bomb-chip{display:flex;align-items:center;gap:4px;background:#1a1a1a;border-radius:20px;padding:3px 8px;flex-shrink:0;font-size:.62rem;}
.bomb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.t-safe{color:var(–safe);}.t-warn{color:var(–warn);}.t-danger{color:var(–danger);animation:blink .4s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── OVERLAY (win/lose) ── */
#overlay{position:absolute;inset:0;background:rgba(0,0,0,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:20;}
#overlay.hidden{display:none;}
#ov-title{font-family:‘Black Ops One’,cursive;font-size:1.8rem;letter-spacing:4px;text-align:center;}
#ov-sub{font-size:.72rem;letter-spacing:1px;color:#888;text-align:center;padding:0 20px;line-height:1.6;}
.ov-btns{display:flex;gap:10px;}
.ov-btn{background:var(–accent);border:none;border-radius:6px;color:#000;font-family:‘Black Ops One’,cursive;font-size:.9rem;letter-spacing:2px;padding:12px 22px;cursor:pointer;touch-action:manipulation;}
.ov-btn.secondary{background:transparent;border:1px solid #444;color:#888;}
.ov-btn.secondary:active{border-color:var(–accent);color:var(–accent);}
#combo-pop{position:absolute;pointer-events:none;font-family:‘Black Ops One’,cursive;font-size:1.1rem;color:var(–accent);text-shadow:0 0 8px var(–accent);opacity:0;z-index:10;transition:opacity .6s,transform .6s;}

/* ── LANDSCAPE ── */
@media(orientation:landscape){
#app{flex-direction:row;flex-wrap:wrap;}
#topbar{width:100%;order:0;padding:4px 12px;}
#topbar h1{font-size:.8rem;}
.stat-value{font-size:.75rem;}
#canvas-wrap{order:1;flex:1;height:calc(100dvh - 32px);}
#controls{order:2;width:148px;flex-shrink:0;border-top:none;border-left:1px solid #222;height:calc(100dvh - 32px);overflow-y:auto;padding:8px;justify-content:flex-start;}
#bomb-strip{flex-direction:column;overflow-x:visible;}
#fire-btn{width:100%;height:44px;font-size:.85rem;}
#pslider{display:none;}
}
</style>

</head>
<body>

<!-- HOME SCREEN -->

<div id="home">
  <div id="home-title">BLAST<br>BILLIARDS</div>
  <div id="home-sub">💣 &nbsp; pocket bombs before they blow</div>
  <div class="diff-label">Select Difficulty</div>
  <div class="diff-btns">
    <button class="diff-btn" id="d-easy"  onclick="selectDiff('easy')">EASY</button>
    <button class="diff-btn active" id="d-normal" onclick="selectDiff('normal')">NORMAL</button>
    <button class="diff-btn" id="d-hard"  onclick="selectDiff('hard')">HARD</button>
  </div>
  <div id="home-desc">Normal speed. Standard ball count per level.</div>
  <button id="home-start" onclick="launchGame()">LIGHT FUSE</button>
</div>

<!-- GAME -->

<div id="app">
  <div id="topbar">
    <h1>💣 BLAST</h1>
    <div class="stats">
      <div class="stat"><span class="stat-label">LVL</span><span class="stat-value" id="s-lvl">1</span></div>
      <div class="stat"><span class="stat-label">SCORE</span><span class="stat-value" id="s-score">0</span></div>
      <div class="stat"><span class="stat-label">LEFT</span><span class="stat-value" id="s-left">0</span></div>
      <div class="stat"><span class="stat-label">DIFF</span><span class="stat-value" id="s-diff" style="color:var(--accent)">NRM</span></div>
    </div>
    <button id="btn-home" onclick="goHome()">MENU</button>
  </div>
  <div id="canvas-wrap">
    <canvas id="game"></canvas>
    <div id="combo-pop"></div>
    <div id="overlay" class="hidden">
      <div id="ov-title"></div>
      <div id="ov-sub"></div>
      <div class="ov-btns">
        <button class="ov-btn" id="ov-next" onclick="nextLevel()">NEXT</button>
        <button class="ov-btn secondary" onclick="goHome()">MENU</button>
      </div>
    </div>
  </div>
  <div id="controls">
    <div class="ctrl-row">
      <div id="spin-wrap">
        <span class="ctrl-label">SPIN</span>
        <canvas id="spin-canvas" width="60" height="60"></canvas>
      </div>
      <div id="power-wrap">
        <div id="power-row"><span class="ctrl-label">POWER</span><span id="power-pct">60%</span></div>
        <div id="power-track"><div id="power-fill"></div></div>
        <input type="range" id="pslider" min="10" max="100" value="60">
      </div>
      <button id="fire-btn" onclick="shoot()">FIRE</button>
    </div>
    <div id="bomb-strip"></div>
  </div>
</div>

<script>
// ── Difficulty ────────────────────────────────────────────────────────────
const DIFF_DESCS = {
  easy:   'Extra time (+50%) and fewer balls (-20%) per level.',
  normal: 'Normal speed. Standard ball count per level.',
  hard:   'Same time but 20% more balls per level. Good luck.'
};
const DIFF_LABELS = { easy:'EZ', normal:'NRM', hard:'HRD' };

let difficulty = 'normal';

function selectDiff(d) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('d-'+d).classList.add('active');
  document.getElementById('home-desc').textContent = DIFF_DESCS[d];
}

function launchGame() {
  document.getElementById('home').classList.add('hidden');
  document.getElementById('s-diff').textContent = DIFF_LABELS[difficulty];
  G.score = 0; G.level = 1;
  startLevel();
}

function goHome() {
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
  G.phase = 'idle';
  G.cue = null; G.balls = [];
}

// ── Base level data (normal difficulty) ───────────────────────────────────
// Columns: balls, time(s). Bombs appear from level 3 onward.
const BASE_LEVELS = [
  {n:3, t:60},  // 1
  {n:4, t:58},  // 2
  {n:5, t:55},  // 3  <- bombs start here
  {n:6, t:52},  // 4
  {n:7, t:49},  // 5
  {n:8, t:46},  // 6
  {n:9, t:43},  // 7
  {n:10,t:40},  // 8+
];

function getLevelData(lvl) {
  const base = BASE_LEVELS[Math.min(lvl - 1, BASE_LEVELS.length - 1)];
  let n = base.n, t = base.t;
  if (difficulty === 'easy')  { n = Math.max(1, Math.round(n * 0.8));  t = Math.round(t * 1.5); }
  if (difficulty === 'hard')  { n = Math.round(n * 1.2); }
  const hasBombs = true; // all balls have timers from level 1
  return { n, t, hasBombs };
}

// ── Table geometry ─────────────────────────────────────────────────────────
let T = {};

function buildTable() {
  const W = canvas.width, H = canvas.height;
  const RAIL = 14, WOOD = 8;
  const isPortrait = H > W;
  // Table fills the entire canvas — rail inset creates the playing surface
  const tw = W, th = H;
  const ox = 0, oy = 0;
  const ix = ox+RAIL, iy = oy+RAIL, iw = tw-RAIL*2, ih = th-RAIL*2;
  const PR = Math.round(Math.min(Math.min(tw,th)*0.10, 24));
  T = { ox,oy,ow:tw,oh:th, ix,iy,iw,ih, rail:RAIL,wood:WOOD,pr:PR,
        left:ix, right:ix+iw, top:iy, bottom:iy+ih, isPortrait };
  if (isPortrait) {
    T.pockets = [
      {x:T.ix,       y:T.iy},       {x:T.ix+T.iw,  y:T.iy},
      {x:T.ix,       y:T.iy+T.ih/2},{x:T.ix+T.iw,  y:T.iy+T.ih/2},
      {x:T.ix,       y:T.iy+T.ih},  {x:T.ix+T.iw,  y:T.iy+T.ih},
    ];
  } else {
    T.pockets = [
      {x:T.ix,       y:T.iy},       {x:T.ix+T.iw/2,y:T.iy},       {x:T.ix+T.iw,y:T.iy},
      {x:T.ix,       y:T.iy+T.ih},  {x:T.ix+T.iw/2,y:T.iy+T.ih},  {x:T.ix+T.iw,y:T.iy+T.ih},
    ];
  }
}

const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const spinCv = document.getElementById('spin-canvas');
const sCtx   = spinCv.getContext('2d');
const wrap   = document.getElementById('canvas-wrap');

function resizeCanvas() {
  // Use offsetWidth/Height to get the actual rendered pixel size
  canvas.width  = wrap.offsetWidth;
  canvas.height = wrap.offsetHeight;
  buildTable();
}
window.addEventListener('resize', resizeCanvas);

// ── Game state ─────────────────────────────────────────────────────────────
const BCOLORS = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#1abc9c','#e91e63','#ff6b00','#00bcd4'];
const BALL_R   = 9;
const FRICTION = 0.980;
const MIN_SPD  = 0.08;

let G = {
  balls:[], cue:null, phase:'idle',
  aimAngle:Math.PI, power:60,
  spinX:0, spinY:0,
  score:0, level:1, combo:0,
  particles:[], shake:0,
};

// ── Ball placement: varied per level ──────────────────────────────────────
// We use a seeded-ish placement strategy: cluster, spread, diagonal, triangle etc.
function placeBalls(n, lvl, hasBombs) {
  const balls = [];
  // Cue ball reference
  const cueX = G.cue.x, cueY = G.cue.y;

  // Pattern varies by level
  const pattern = ((lvl - 1) % 6);
  const candidates = generateCandidates(n, pattern, cueX, cueY);

  for (let i = 0; i < candidates.length && balls.length < n; i++) {
    const {x,y} = candidates[i];
    if (Math.hypot(x-cueX, y-cueY) < 65) continue;
    if (balls.some(b => Math.hypot(x-b.x, y-b.y) < BALL_R*2.6)) continue;
    if (T.pockets.some(p => Math.hypot(x-p.x, y-p.y) < T.pr*1.4)) continue;
    if (x < T.left+BALL_R*2 || x > T.right-BALL_R*2) continue;
    if (y < T.top+BALL_R*2  || y > T.bottom-BALL_R*2) continue;
    balls.push({x,y});
  }

  // Fallback: random for any remaining
  let safety = 0;
  while (balls.length < n && safety++ < 600) {
    const x = T.ix + BALL_R*2 + Math.random()*(T.iw - BALL_R*4);
    const y = T.iy + BALL_R*2 + Math.random()*(T.ih - BALL_R*4);
    if (Math.hypot(x-cueX, y-cueY) < 65) continue;
    if (balls.some(b => Math.hypot(x-b.x, y-b.y) < BALL_R*2.6)) continue;
    if (T.pockets.some(p => Math.hypot(x-p.x, y-p.y) < T.pr*1.4)) continue;
    balls.push({x,y});
  }
  return balls;
}

function generateCandidates(n, pattern, cueX, cueY) {
  const pts = [];
  const cx = (T.ix+T.right)/2, cy = (T.iy+T.bottom)/2;
  const hw = T.iw/2 - BALL_R*3, hh = T.ih/2 - BALL_R*3;

  if (pattern === 0) {
    // Triangle rack (portrait: vertical, landscape: horizontal)
    const spacing = BALL_R*2.4;
    if (T.isPortrait) {
      let py = T.iy + T.ih*0.35;
      let row = 1;
      while (pts.length < n*3) {
        const rowW = (row-1)*spacing;
        for (let c=0;c<row;c++) pts.push({x: cx - rowW/2 + c*spacing, y: py});
        py += spacing*0.87; row++;
        if (row > 5) break;
      }
    } else {
      let px = T.ix + T.iw*0.55;
      let row = 1;
      while (pts.length < n*3) {
        const rowH = (row-1)*spacing;
        for (let c=0;c<row;c++) pts.push({x:px, y: cy - rowH/2 + c*spacing});
        px += spacing*0.87; row++;
        if (row > 5) break;
      }
    }
  } else if (pattern === 1) {
    // Spread evenly across table
    for (let i=0;i<n*4;i++) {
      const angle = (i/n)*Math.PI*2 + i*0.3;
      const r = 0.3 + (i%3)*0.2;
      pts.push({x: cx + Math.cos(angle)*hw*r, y: cy + Math.sin(angle)*hh*r});
    }
  } else if (pattern === 2) {
    // Diagonal line
    for (let i=0;i<n*3;i++) {
      const t2 = i/(n*3-1);
      pts.push({x: T.ix+BALL_R*3 + t2*(T.iw-BALL_R*6), y: T.iy+BALL_R*3 + t2*(T.ih-BALL_R*6)});
      pts.push({x: T.ix+BALL_R*3 + t2*(T.iw-BALL_R*6), y: T.iy+T.ih-BALL_R*3 - t2*(T.ih-BALL_R*6)});
    }
  } else if (pattern === 3) {
    // Clustered in centre
    for (let i=0;i<n*4;i++) {
      const a = Math.random()*Math.PI*2;
      const r = BALL_R*2.5 + Math.random()*BALL_R*n*0.8;
      pts.push({x:cx+Math.cos(a)*r, y:cy+Math.sin(a)*r});
    }
  } else if (pattern === 4) {
    // Grid
    const cols = Math.ceil(Math.sqrt(n*1.5));
    const rows = Math.ceil(n*1.5/cols);
    const gw = Math.min(T.iw*0.6, cols*BALL_R*2.8);
    const gh = Math.min(T.ih*0.6, rows*BALL_R*2.8);
    for (let r=0;r<rows;r++) for(let c=0;c<cols;c++)
      pts.push({x: cx-gw/2+c*gw/(cols-1||1), y: cy-gh/2+r*gh/(rows-1||1)});
  } else {
    // Perimeter ring
    for (let i=0;i<n*3;i++) {
      const a = (i/(n*3))*Math.PI*2;
      pts.push({x:cx+Math.cos(a)*hw*0.75, y:cy+Math.sin(a)*hh*0.75});
      pts.push({x:cx+Math.cos(a)*hw*0.4,  y:cy+Math.sin(a)*hh*0.4});
    }
  }
  // Shuffle so we pick from anywhere in the pattern
  for (let i=pts.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [pts[i],pts[j]]=[pts[j],pts[i]]; }
  return pts;
}

// ── Start level ────────────────────────────────────────────────────────────
function startLevel() {
  document.getElementById('overlay').classList.add('hidden');
  resizeCanvas();
  const lvl  = getLevelData(G.level);
  G.balls=[]; G.particles=[]; G.combo=0;

  G.cue = T.isPortrait
    ? {x:T.ix+Math.round(T.iw/2),   y:T.iy+Math.round(T.ih*0.75), vx:0,vy:0,r:BALL_R}
    : {x:T.ix+Math.round(T.iw*0.25),y:T.iy+Math.round(T.ih/2),    vx:0,vy:0,r:BALL_R};

  const positions = placeBalls(lvl.n, G.level, lvl.hasBombs);

  positions.forEach((pos,i) => {
    const isBomb = lvl.hasBombs; // all balls are bombs from level 3
    const tv = lvl.t + (Math.random()-0.5)*4;
    G.balls.push({
      x:pos.x, y:pos.y, vx:0,vy:0, r:BALL_R,
      color: BCOLORS[i % BCOLORS.length],
      isBomb,
      timer:tv, maxTimer:tv, id:i,
      potted:false, exploded:false,
      ph:Math.random()*Math.PI*2
    });
  });

  G.phase='aiming';
  refreshStrip();
}

// Alias for overlay button
function nextLevel() { startLevel(); }

// ── Touch: prevent controls area from triggering aim ──────────────────────
// We mark the controls element so document touchstart can check target.
const controlsEl = document.getElementById('controls');
const powerTrackEl = document.getElementById('power-track');
const psliderEl    = document.getElementById('pslider');

function isTouchInControls(t) {
  // Check if the touch target is inside the controls panel
  const el = document.elementFromPoint(t.clientX, t.clientY);
  return el && controlsEl.contains(el);
}

// ── Aim control ────────────────────────────────────────────────────────────
let aimTouchId      = null;
let aimTouchStartX  = 0;
let aimTouchStartY  = 0;
let aimAngleAtStart = 0;

document.addEventListener('touchstart', e => {
  if (G.phase !== 'aiming' || !G.cue || spinDn) return;
  if (aimTouchId !== null) return;
  const t = e.changedTouches[0];
  if (isTouchInControls(t)) return;

  // Check if touch lands near a ball touch-point dot (snap mode)
  // Convert touch to canvas coords
  const cr = canvas.getBoundingClientRect();
  const tx = t.clientX - cr.left;
  const ty = t.clientY - cr.top;
  const SNAP_DIST = 18; // px tolerance around each dot
  const RING = BALL_R + 14;
  let snapped = false;
  for (const b of G.balls) {
    if (b.potted || b.exploded) continue;
    for (let i=0; i<8; i++) {
      const a  = (i/8)*Math.PI*2;
      const px = b.x + Math.cos(a)*RING;
      const py = b.y + Math.sin(a)*RING;
      if (Math.hypot(tx-px, ty-py) < SNAP_DIST) {
        // Aim from cue ball toward this contact point on the ball
        // The shot direction = cue → (b.x + cos(a)*b.r, b.y + sin(a)*b.r)
        const contactX = b.x + Math.cos(a)*b.r;
        const contactY = b.y + Math.sin(a)*b.r;
        G.aimAngle = Math.atan2(contactY - G.cue.y, contactX - G.cue.x);
        aimAngleAtStart = G.aimAngle;
        aimTouchId     = t.identifier;
        aimTouchStartX = t.clientX;
        aimTouchStartY = t.clientY;
        snapped = true;
        break;
      }
    }
    if (snapped) break;
  }

  if (!snapped) {
    aimTouchId      = t.identifier;
    aimTouchStartX  = t.clientX;
    aimTouchStartY  = t.clientY;
    aimAngleAtStart = G.aimAngle; // freeze — do NOT jump on new touch
  }
}, {passive:true});

document.addEventListener('touchmove', e => {
  if (aimTouchId === null) return;
  for (let i=0; i<e.changedTouches.length; i++) {
    const t = e.changedTouches[i];
    if (t.identifier !== aimTouchId) continue;
    if (G.phase !== 'aiming' || !G.cue) break;
    const dx = t.clientX - aimTouchStartX;
    const dy = t.clientY - aimTouchStartY;
    G.aimAngle = aimAngleAtStart + (dx + dy*0.3) * 0.009;
    break;
  }
}, {passive:true});

document.addEventListener('touchend', e => {
  for (let i=0;i<e.changedTouches.length;i++) {
    if (e.changedTouches[i].identifier===aimTouchId) { aimTouchId=null; break; }
  }
}, {passive:true});

document.addEventListener('touchcancel', e => {

  }

// ── Spin pad ───────────────────────────────────────────────────────────────
let spinDn = false;
spinCv.addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();spinDn=true;doSpin(e);},{passive:false});
spinCv.addEventListener('touchmove', e=>{e.stopPropagation();e.preventDefault();if(spinDn)doSpin(e);},{passive:false});

function doSpin(e) {
  const r=spinCv.getBoundingClientRect();
  const s=e.touches?e.touches[0]:e;
  const cx=30,cy=30,rad=26;
  let dx=s.clientX-r.left-cx, dy=s.clientY-r.top-cy;
  const d=Math.hypot(dx,dy);
  if(d>rad){dx=dx/d*rad;dy=dy/d*rad;}
  G.spinX=dx/rad; G.spinY=dy/rad;
}

function applyPowerTouch(e) {

// ── Shoot ──────────────────────────────────────────────────────────────────
function shoot() {
  if(G.phase!=='aiming'||!G.cue) return;
  const spd=G.power*0.18;
  G.cue.vx=Math.cos(G.aimAngle)*spd + G.spinX*1.4;
  G.cue.vy=Math.sin(G.aimAngle)*spd + G.spinY*1.4;
  G.phase='rolling'; G.combo=0;
}

// ── Ray cast ───────────────────────────────────────────────────────────────
function castRay(ox,oy,dx,dy,r) {
  let minT=1200, res={x:ox+dx*minT,y:oy+dy*minT,type:'wall',ball:null};
  const walls=[
    {axis:'x',v:T.left+r},  {axis:'x',v:T.right-r},
    {axis:'y',v:T.top+r},   {axis:'y',v:T.bottom-r},
  ];
  for(const w of walls){
    const t=w.axis==='x'?(w.v-ox)/dx:(w.v-oy)/dy;
    if(t>2&&t<minT){minT=t;res={x:ox+dx*t,y:oy+dy*t,type:'wall',ball:null};}
  }
  for(const b of G.balls){
    if(b.potted||b.exploded) continue;
    const fx=b.x-ox,fy=b.y-oy,dot=fx*dx+fy*dy;
    if(dot<0) continue;
    const p2=fx*fx+fy*fy-dot*dot, md=r+b.r;
    if(p2>md*md) continue;
    const t=dot-Math.sqrt(md*md-p2);
    if(t>2&&t<minT){minT=t;res={x:ox+dx*t,y:oy+dy*t,type:'ball',ball:b};}
  }
  return res;
}

// ── Physics ────────────────────────────────────────────────────────────────
function moveBall(ball,isCue) {
  ball.x+=ball.vx; ball.y+=ball.vy;
  ball.vx*=FRICTION; ball.vy*=FRICTION;
  if(ball.x-ball.r<T.left)  {ball.x=T.left+ball.r;  ball.vx= Math.abs(ball.vx)*0.8;}
  if(ball.x+ball.r>T.right) {ball.x=T.right-ball.r; ball.vx=-Math.abs(ball.vx)*0.8;}
  if(ball.y-ball.r<T.top)   {ball.y=T.top+ball.r;   ball.vy= Math.abs(ball.vy)*0.8;}
  if(ball.y+ball.r>T.bottom){ball.y=T.bottom-ball.r; ball.vy=-Math.abs(ball.vy)*0.8;}
  for(const p of T.pockets){
    if(Math.hypot(ball.x-p.x,ball.y-p.y)<T.pr){
      if(isCue){
        ball.x=T.isPortrait?T.ix+Math.round(T.iw/2):T.ix+Math.round(T.iw*0.25);
        ball.y=T.isPortrait?T.iy+Math.round(T.ih*0.75):T.iy+Math.round(T.ih/2);
        ball.vx=ball.vy=0;
      } else {
        ball.potted=true; G.combo++;
        const pts=100*G.combo; G.score+=pts;
        showCombo(ball.x,ball.y,G.combo,pts);
        refreshStrip();
      }
      return;
    }
  }
}

function resolveBB(a,b) {
  const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy);
  if(d===0||d>=a.r+b.r) return;
  const nx=dx/d,ny=dy/d,ov=(a.r+b.r)-d;
  a.x-=nx*ov*0.5; a.y-=ny*ov*0.5;
  b.x+=nx*ov*0.5; b.y+=ny*ov*0.5;
  const dvn=(a.vx-b.vx)*nx+(a.vy-b.vy)*ny;
  if(dvn>0){a.vx-=dvn*nx;a.vy-=dvn*ny;b.vx+=dvn*nx;b.vy+=dvn*ny;}
}

function physics() {
  if(G.phase!=='rolling') return;
  moveBall(G.cue,true);
  const active=G.balls.filter(b=>!b.potted&&!b.exploded);
  for(const b of active) moveBall(b,false);
  for(const b of active) resolveBB(G.cue,b);
  for(let i=0;i<active.length;i++) for(let j=i+1;j<active.length;j++) resolveBB(active[i],active[j]);

  const cs=Math.hypot(G.cue.vx,G.cue.vy);
  // Allow aiming once everything is slow enough — zero ALL velocities immediately
  // so no residual motion carries into the next shot.
  const SLOW = MIN_SPD * 6;
  if(cs < SLOW && !active.some(b=>Math.hypot(b.vx,b.vy) > SLOW)) {
    // Hard-zero every ball so nothing can drift later
    G.cue.vx=0; G.cue.vy=0;
    active.forEach(b=>{ b.vx=0; b.vy=0; });
    G.phase='aiming';
    checkEnd();
  }
}

// ── Timers ─────────────────────────────────────────────────────────────────
function tickTimers(dt) {
  if(G.phase!=='aiming'&&G.phase!=='rolling') return;
  for(const b of G.balls){
    if(b.potted||b.exploded) continue;
    if(!b.isBomb) continue; // non-bomb balls (levels 1-2) don't tick
    b.timer-=dt;
    if(b.timer<=0) explodeBall(b);
  }
  refreshStrip();
}

function explodeBall(b) {
  b.exploded=true; G.shake=0.5;
  for(let i=0;i<20;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*5;
    G.particles.push({x:b.x,y:b.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,r:2+Math.random()*3,color:Math.random()>.5?'#ff6b00':'#ff2a2a'});
  }
  setTimeout(checkEnd,100);
}

function checkEnd() {
  if(G.balls.some(b=>b.exploded)){
    showOver('BOOM!','A bomb detonated. Game over.',true); return;
  }
  if(!G.balls.some(b=>!b.potted&&!b.exploded)){
    G.score+=G.level*500;
    showOver('CLEARED!','Level '+G.level+' done! +'+G.level*500+' pts',false);
    G.level++;
  }
}

function showOver(title,sub,lose) {
  G.phase='idle';
  const el=document.getElementById('ov-title');
  el.innerHTML=title; el.style.color=lose?'#ff2a2a':'#00ff88';
  document.getElementById('ov-sub').innerHTML=sub;
  const nextBtn=document.getElementById('ov-next');
  if(lose){ nextBtn.textContent='RETRY'; G.score=0; G.level=1; }
  else     { nextBtn.textContent='NEXT LEVEL'; }
  document.getElementById('overlay').classList.remove('hidden');
}

function showCombo(x,y,combo,pts) {
  const el=document.getElementById('combo-pop');
  el.style.left=x+'px'; el.style.top=(y-24)+'px';
  el.textContent=combo>1?('x'+combo+'! +'+pts):('+'+pts);
  el.style.color=combo>2?'#ff6b00':'#00ff88';
  el.style.opacity=1; el.style.transform='translateY(0)'; el.style.transition='none';
  setTimeout(()=>{el.style.transition='opacity .7s,transform .7s';el.style.opacity=0;el.style.transform='translateY(-30px)';},40);
}

function tickParticles(dt) {
  for(let i=G.particles.length-1;i>=0;i--){
    const p=G.particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.vx*=0.97;p.vy*=0.97;p.life-=dt*1.4;
    if(p.life<=0)G.particles.splice(i,1);
  }
}

// ── Drawing ────────────────────────────────────────────────────────────────
function drawTable() {
  const{ox,oy,ow,oh,ix,iy,iw,ih,rail,pr}=T;
  const W=canvas.width, H=canvas.height;

  // ── Outer wood frame: rich walnut with grain ──────────────────────────────
  // Base walnut colour
  const woodBase = ctx.createLinearGradient(0,0,W,H);
  woodBase.addColorStop(0,'#3b1e08');
  woodBase.addColorStop(0.3,'#5c2e0e');
  woodBase.addColorStop(0.6,'#4a2409');
  woodBase.addColorStop(1,'#2e1505');
  ctx.fillStyle=woodBase;
  ctx.fillRect(0,0,W,H);

  // Grain lines — subtle horizontal streaks
  ctx.save();
  ctx.globalAlpha=0.07;
  for(let i=0;i<22;i++){
    const y0 = (i/22)*H + Math.sin(i*1.7)*6;
    const gw = ctx.createLinearGradient(0,y0,W,y0+4);
    gw.addColorStop(0,'transparent');
    gw.addColorStop(0.2+(i%3)*0.1,'#c07030');
    gw.addColorStop(1,'transparent');
    ctx.fillStyle=gw;
    ctx.fillRect(0,y0,W,3+Math.sin(i)*2);
  }
  ctx.restore();

  // Inner highlight/shadow bevel around frame edge
  ctx.save();
  // Top/left light edge
  ctx.strokeStyle='rgba(220,140,60,0.25)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,H);ctx.lineTo(0,0);ctx.lineTo(W,0);ctx.stroke();
  // Bottom/right shadow edge
  ctx.strokeStyle='rgba(0,0,0,0.45)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(W,0);ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.stroke();
  ctx.restore();

  // ── Cushion rail — darker walnut with inlay accent line ──────────────────
  const railGrad = ctx.createLinearGradient(ox,oy,ox+ow,oy+oh);
  railGrad.addColorStop(0,'#4a2208');
  railGrad.addColorStop(0.5,'#6b330f');
  railGrad.addColorStop(1,'#3a1a06');
  ctx.fillStyle=railGrad;
  ctx.fillRect(ox,oy,ow,oh);

  // Rail bevel: inner shadow so rail looks 3-D inset
  const inset=2;
  ctx.save();
  ctx.strokeStyle='rgba(0,0,0,0.55)';ctx.lineWidth=3;
  ctx.strokeRect(ox+inset,oy+inset,ow-inset*2,oh-inset*2);
  ctx.strokeStyle='rgba(200,120,40,0.18)';ctx.lineWidth=1.5;
  ctx.strokeRect(ox,oy,ow,oh);
  // Thin brass/gold inlay line just inside rail edge
  ctx.strokeStyle='rgba(190,145,55,0.55)';ctx.lineWidth=1;
  ctx.strokeRect(ox+rail-3,oy+rail-3,ow-rail*2+6,oh-rail*2+6);
  ctx.restore();

  // ── Pocket holes with leather lining ─────────────────────────────────────
  for(const p of T.pockets){
    // Outer leather ring
    ctx.beginPath();ctx.arc(p.x,p.y,pr+3,0,Math.PI*2);
    const lg=ctx.createRadialGradient(p.x-2,p.y-2,1,p.x,p.y,pr+3);
    lg.addColorStop(0,'#2a1205');lg.addColorStop(1,'#0a0602');
    ctx.fillStyle=lg;ctx.fill();
    // Dark hole
    ctx.beginPath();ctx.arc(p.x,p.y,pr,0,Math.PI*2);
    ctx.fillStyle='#080808';ctx.fill();
    // Subtle rim highlight
    ctx.beginPath();ctx.arc(p.x,p.y,pr,0,Math.PI*2);
    ctx.strokeStyle='rgba(100,55,15,0.6)';ctx.lineWidth=1.5;ctx.stroke();
  }

  // ── Felt playing surface ──────────────────────────────────────────────────
  // Rich tournament green with slight vignette
  const fg=ctx.createRadialGradient(ix+iw/2,iy+ih/2,Math.min(iw,ih)*0.1, ix+iw/2,iy+ih/2,Math.max(iw,ih)*0.75);
  fg.addColorStop(0,'#236b3a');
  fg.addColorStop(0.6,'#1b5430');
  fg.addColorStop(1,'#143d22');
  ctx.fillStyle=fg;ctx.fillRect(ix,iy,iw,ih);

  // Felt nap texture: very faint diagonal hatching
  ctx.save();ctx.globalAlpha=0.018;ctx.strokeStyle='#ffffff';ctx.lineWidth=1;
  for(let d=-Math.max(iw,ih);d<Math.max(iw,ih)*2;d+=7){
    ctx.beginPath();ctx.moveTo(ix+d,iy);ctx.lineTo(ix+d+ih,iy+ih);ctx.stroke();
  }
  ctx.restore();

  // ── Table markings ────────────────────────────────────────────────────────
  ctx.strokeStyle='rgba(255,255,255,.09)';ctx.lineWidth=1;
  if(T.isPortrait){
    const by2=iy+Math.round(ih*0.75);
    ctx.beginPath();ctx.moveTo(ix,by2);ctx.lineTo(ix+iw,by2);ctx.stroke();
    const dr2=Math.round(iw*0.18);
    ctx.beginPath();ctx.arc(ix+iw/2,by2,dr2,0,Math.PI);ctx.stroke();
    [[.5,.5],[.5,.25],[.5,.125]].forEach(([fx,fy])=>{
      ctx.beginPath();ctx.arc(ix+iw*fx,iy+ih*fy,2.5,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,.18)';ctx.fill();
    });
  } else {
    const bx2=ix+Math.round(iw*0.25);
    ctx.beginPath();ctx.moveTo(bx2,iy);ctx.lineTo(bx2,iy+ih);ctx.stroke();
    const dr2=Math.round(ih*0.18);
    ctx.beginPath();ctx.arc(bx2,iy+ih/2,dr2,-Math.PI/2,Math.PI/2);ctx.stroke();
    [[.5,.5],[.75,.5],[.875,.5]].forEach(([fx,fy])=>{
      ctx.beginPath();ctx.arc(ix+iw*fx,iy+ih*fy,2.5,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,.18)';ctx.fill();
    });
  }

  // Inner cushion shadow line
  ctx.strokeStyle='rgba(0,0,0,0.6)';ctx.lineWidth=3;
  ctx.strokeRect(ix,iy,iw,ih);
  ctx.strokeStyle='rgba(0,0,0,0.25)';ctx.lineWidth=1;
  ctx.strokeRect(ix+2,iy+2,iw-4,ih-4);
}

// Single timer bar — uses the shortest remaining bomb timer.
// Sits in the wood rail at the very top of the table frame (portrait)
// or the very left edge (landscape), centred within the rail thickness.
// Green >= 50%, Yellow < 50%, Red <= 25%.
function drawTimerBar() {
  const alive = G.balls.filter(b=>!b.potted&&!b.exploded&&b.isBomb);
  if(!alive.length) return;

  let minTimer = Infinity, maxTimer = 1;
  for(const b of alive){
    if(b.timer < minTimer){ minTimer=b.timer; maxTimer=b.maxTimer; }
  }
  const frac = Math.max(0, Math.min(1, minTimer/maxTimer));
  const col = frac<=0.25 ? '#ff2a2a' : frac<=0.50 ? '#ffaa00' : '#00e676';

  // Bar lives in the rail (wood), not the felt.
  // Rail spans T.oy → T.iy (top) or T.ox → T.ix (left). Thickness = T.rail.
  const RAIL = T.rail;          // 14px rail thickness
  const H    = 4;               // bar height
  const PAD  = 5;               // horizontal padding inside rail
  const R    = 2;               // corner radius

  if(T.isPortrait){
    // Centre bar vertically within the top rail
    const bx = T.ox + PAD;
    const bw = T.ow - PAD*2;
    const by = T.oy + Math.round((RAIL - H) / 2); // centred in rail
    // Dark track
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.beginPath();ctx.roundRect(bx,by,bw,H,R);ctx.fill();
    // Coloured fill
    ctx.fillStyle=col;
    ctx.beginPath();ctx.roundRect(bx,by,Math.round(bw*frac),H,R);ctx.fill();
    // Glow
    ctx.save();ctx.shadowBlur=8;ctx.shadowColor=col;ctx.globalAlpha=0.5;
    ctx.fillStyle=col;
    ctx.beginPath();ctx.roundRect(bx,by,Math.round(bw*frac),H,R);ctx.fill();
    ctx.restore();
  } else {
    // Centre bar horizontally within the left rail
    const by = T.oy + PAD;
    const bh = T.oh - PAD*2;
    const bx = T.ox + Math.round((RAIL - H) / 2);
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.beginPath();ctx.roundRect(bx,by,H,bh,R);ctx.fill();
    ctx.fillStyle=col;
    ctx.beginPath();ctx.roundRect(bx,by,H,Math.round(bh*frac),R);ctx.fill();
    ctx.save();ctx.shadowBlur=8;ctx.shadowColor=col;ctx.globalAlpha=0.5;
    ctx.fillStyle=col;
    ctx.beginPath();ctx.roundRect(bx,by,H,Math.round(bh*frac),R);ctx.fill();
    ctx.restore();
  }
}

function drawAimLine() {
  if(G.phase!=='aiming'||!G.cue) return;
  const{x,y,r}=G.cue;
  const cos=Math.cos(G.aimAngle),sin=Math.sin(G.aimAngle);
  const hit=castRay(x,y,cos,sin,r);
  ctx.save();
  ctx.setLineDash([8,6]);ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(hit.x,hit.y);ctx.stroke();
  if(hit.type==='ball'){
    const b=hit.ball,d=Math.hypot(hit.x-b.x,hit.y-b.y);
    const nx=(hit.x-b.x)/(d||1),ny=(hit.y-b.y)/(d||1);
    ctx.setLineDash([]);ctx.beginPath();ctx.arc(hit.x,hit.y,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1;ctx.stroke();
    ctx.setLineDash([6,5]);ctx.strokeStyle='rgba(255,200,80,.3)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b.x+nx*70,b.y+ny*70);ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.translate(x,y);ctx.rotate(G.aimAngle+Math.PI);
  const cg=ctx.createLinearGradient(14,0,100,0);
  cg.addColorStop(0,'#f5d06e');cg.addColorStop(.4,'#c8a84b');cg.addColorStop(1,'#5c3317');
  ctx.strokeStyle=cg;ctx.lineWidth=5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(14,0);ctx.lineTo(100,0);ctx.stroke();
  ctx.restore();
}

function lighten(hex,amt){
  const n=parseInt(hex.replace('#',''),16);
  return 'rgb('+Math.min(255,(n>>16)+amt)+','+Math.min(255,((n>>8)&255)+amt)+','+Math.min(255,(n&255)+amt)+')';
}

function drawBalls() {
  const now=Date.now()/1000;
  for(const b of G.balls){
    if(b.potted||b.exploded) continue;
    const pulse=b.isBomb?Math.max(0,1-b.timer/b.maxTimer):0;
    // Glow when urgent
    if(pulse>0.3){
      ctx.save();ctx.shadowBlur=18*pulse;ctx.shadowColor=b.color;
      ctx.globalAlpha=0.25+0.4*Math.sin(now*8+b.ph)*pulse;
      ctx.beginPath();ctx.arc(b.x,b.y,b.r+4,0,Math.PI*2);
      ctx.fillStyle=b.color;ctx.fill();ctx.restore();
    }
    // Ball body
    const gr=ctx.createRadialGradient(b.x-2,b.y-3,1,b.x,b.y,b.r);
    gr.addColorStop(0,lighten(b.color,70));gr.addColorStop(1,b.color);
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
    // White edge ring — no timer arc
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1.5;ctx.stroke();
    // Ball number label
    ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.font='bold '+Math.round(b.r*0.82)+'px Share Tech Mono';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(b.id+1,b.x,b.y);

  }
  // Cue ball
  if(G.cue){
    const{x,y,r}=G.cue;
    const cg=ctx.createRadialGradient(x-3,y-3,1,x,y,r);
    cg.addColorStop(0,'#ffffff');cg.addColorStop(1,'#e8e8e8');
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=1.5;ctx.stroke();
  }
}

function drawParticles() {
  for(const p of G.particles){
    ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();ctx.restore();
  }
}

function drawSpinPad() {
  const c=sCtx,cx=30,cy=30,r=26;
  c.clearRect(0,0,60,60);
  const g=c.createRadialGradient(cx-5,cy-5,2,cx,cy,r);
  g.addColorStop(0,'#eee');g.addColorStop(1,'#888');
  c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);c.fillStyle=g;c.fill();
  c.strokeStyle='#444';c.lineWidth=1;c.stroke();
  c.strokeStyle='rgba(0,0,0,.15)';c.lineWidth=1;
  c.beginPath();c.moveTo(cx-r,cy);c.lineTo(cx+r,cy);c.stroke();
  c.beginPath();c.moveTo(cx,cy-r);c.lineTo(cx,cy+r);c.stroke();
  const sx=cx+G.spinX*r,sy=cy+G.spinY*r;
  c.beginPath();c.arc(sx,sy,5,0,Math.PI*2);
  c.fillStyle='rgba(255,107,0,.9)';c.fill();
  c.strokeStyle='#000';c.lineWidth=1.5;c.stroke();
}

function refreshStrip() {
  const strip=document.getElementById('bomb-strip');strip.innerHTML='';
  const alive=G.balls.filter(b=>!b.potted&&!b.exploded);
  for(const b of alive){
    const chip=document.createElement('div');chip.className='bomb-chip';
    const dot=document.createElement('div');dot.className='bomb-dot';dot.style.background=b.color;
    const tm=document.createElement('span');
    if(b.isBomb){
      const t2=Math.max(0,b.timer);
      tm.textContent=t2.toFixed(1)+'s';
      tm.className=t2<10?'t-danger':t2<25?'t-warn':'t-safe';
    } else {
      tm.textContent='ball';tm.style.color='#555';
    }
    chip.appendChild(dot);chip.appendChild(tm);strip.appendChild(chip);
  }
  document.getElementById('s-left').textContent=alive.length;
}

// ── Main loop ──────────────────────────────────────────────────────────────
let lastTs=0;
function loop(ts){
  const dt=Math.min((ts-lastTs)/1000,.05);lastTs=ts;
  physics();tickTimers(dt);tickParticles(dt);
  if(G.shake>0)G.shake-=dt;
  ctx.save();
  if(G.shake>0){const s=G.shake*7;ctx.translate((Math.random()-.5)*s,(Math.random()-.5)*s);}
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#0d0d0d';ctx.fillRect(0,0,canvas.width,canvas.height);
  if(G.cue){drawTable();drawTimerBar();drawAimLine();drawBalls();drawParticles();}
  ctx.restore();
  document.getElementById('s-score').textContent=G.score;
  document.getElementById('s-lvl').textContent=G.level;
  drawSpinPad();
  requestAnimationFrame(loop);
}

resizeCanvas();
requestAnimationFrame(ts=>{lastTs=ts;requestAnimationFrame(loop);});
</script>
